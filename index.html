<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="H.A.M.D – نظام إدارة المخازن الاحترافي المتكامل | مبيعات، مشتريات، مخزون، حسابات">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="H.A.M.D">

  <title>H.A.M.D — نظام إدارة المخازن</title>

  <!-- PWA (only works on https/localhost) -->
  <link rel="icon" type="image/jpeg" href="./favicon.jpg">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./favicon.jpg">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Barcode & QR Code Libraries -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Exporting (Excel with styles) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <!-- Firebase v8 (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css">

  <script>
    window.addEventListener('error', (e) => {
      console.error('Global error:', e.error || e.message);
      const errDiv = document.createElement('div');
      errDiv.style = "position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:999999;font-family:monospace";
      errDiv.innerHTML = `<strong>JS Error:</strong> ${e.filename ? e.filename.split('/').pop() : ''}:${e.lineno}:${e.colno} - ${e.message}`;
      if (document.body) document.body.appendChild(errDiv);
      else window.addEventListener('DOMContentLoaded', () => document.body.appendChild(errDiv));
    });
  </script>

  <!-- Preload key assets -->
  <link rel="preload" href="./i18n.js?v=2" as="script">
  <link rel="preload" href="./db.js?v=2" as="script">
  <link rel="preload" href="./app.js?v=2" as="script">
  <link rel="preload" href="./pages.js?v=2" as="script">
</head>

<body>

<!-- ═══════════════════════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════════════════════════ -->
<div id="auth-screen" style="display:none"></div>

<!-- ═══════════════════════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════════════════════ -->
<div id="app" style="display:none"></div>

<!-- ═══════════════════════════════════════════════════════════
     LOADING SPLASH
══════════════════════════════════════════════════════════════ -->
<div id="splash" style="
  position: fixed; inset: 0;
  background: #060b18;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 99999;
  gap: 24px;
">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(99,102,241,0.15) 0%, transparent 70%);pointer-events:none"></div>

  <!-- Logo Animation -->
  <div style="
    width: 88px; height: 88px;
    background: linear-gradient(135deg, #4f46e5, #6366f1, #0ea5e9);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: white;
    box-shadow: 0 0 60px rgba(99,102,241,0.5), 0 0 120px rgba(99,102,241,0.2);
    animation: pulse 1.5s ease-in-out infinite;
    letter-spacing: 0;
    font-family: 'Cairo', sans-serif;
  ">H.A.M</div>

  <div style="text-align:center">
    <h1 style="font-family:'Cairo',sans-serif;font-size:28px;font-weight:900;color:#f1f5f9;letter-spacing:4px;margin:0">H.A.M.D</h1>
    <p style="font-family:'Cairo',sans-serif;font-size:13px;color:#475569;margin:6px 0 0">نظام إدارة المخازن الاحترافي</p>
  </div>

  <!-- Loading Bar -->
  <div style="width:200px;height:4px;background:#1e2d4a;border-radius:99px;overflow:hidden">
    <div id="splash-progress" style="height:100%;background:linear-gradient(90deg,#4f46e5,#0ea5e9);border-radius:99px;width:0%;transition:width 0.3s ease"></div>
  </div>
  <p id="splash-msg" style="font-family:'Cairo',sans-serif;font-size:12px;color:#475569">جاري التهيئة...</p>

  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(99,102,241,0.5); }
      50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(99,102,241,0.7); }
    }
  </style>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
══════════════════════════════════════════════════════════════ -->
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- H.A.M.D Core Scripts -->
<script src="./i18n.js?v=2"></script>
<script src="./db.js?v=2"></script>
<script src="./app.js?v=2"></script>
<script src="./pages.js?v=2"></script>

<script>
// ── SPLASH SCREEN ANIMATION + BOOT ──
(async function boot() {
  const progress = document.getElementById('splash-progress');
  const msg = document.getElementById('splash-msg');

  const step = (pct, text) => {
    progress.style.width = pct + '%';
    msg.textContent = text;
  };

  step(10, 'تهيئة قاعدة البيانات...');
  await new Promise(r => setTimeout(r, 200));

  step(30, 'تحميل البيانات...');
  await new Promise(r => setTimeout(r, 200));

  try {
    step(60, 'تهيئة التطبيق...');
    await App.init();

    step(100, 'جاهز! ✓');
    await new Promise(r => setTimeout(r, 400));

    // Hide splash
    const splash = document.getElementById('splash');
    splash.style.opacity = '0';
    splash.style.transition = 'opacity 0.5s ease';
    setTimeout(() => splash.remove(), 500);
  } catch (err) {
    console.error('Boot error:', err);
    msg.innerHTML = '<div style="background:#fff;color:red;padding:10px;text-align:left;direction:ltr;border-radius:4px">' + err.message + '<br>' + (err.stack || '') + '</div>';
    msg.style.color = '#ef4444';
    progress.style.background = '#ef4444';
  }
})();



// ── SERVICE WORKER (only on https or localhost) ──
function setupServiceWorker() {
    const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if ('serviceWorker' in navigator && isSecure) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('SW registered:', reg.scope);
      }).catch(err => console.warn('SW registration failed:', err));
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data.type === 'SYNC_START') {
          Toast.show('جاري مزامنة البيانات...', 'info');
        }
      });
    } else {
      console.log('SW skipped (not on secure context) - IndexedDB offline storage still active');
    }
}

window.addEventListener('unhandledrejection', (e) => {
  console.error('Unhandled promise rejection:', e.reason);
});

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey)) {
    switch (e.key) {
      case 'p': case 'P': e.preventDefault(); App.navigate('pos'); break;
      case 'i': case 'I': e.preventDefault(); App.navigate('products'); break;
      case 's': case 'S': e.preventDefault(); App.navigate('sales'); break;
      case 'd': case 'D': e.preventDefault(); App.navigate('dashboard'); break;
    }
  }
  if (e.key === 'Escape') Modal.closeAll();
});

// ── PREVENT CONTEXT MENU (OPTIONAL) ──
// document.addEventListener('contextmenu', e => e.preventDefault());

// ── PWA INSTALL PROMPT ──
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window._deferredPrompt = e;
  // Show subtle install hint after 30s
  setTimeout(() => {
    if (document.getElementById('toast-container')) {
      Toast.show('💡 يمكنك تثبيت H.A.M.D كتطبيق على جهازك!', 'info', 6000);
    }
  }, 30000);
});

window.addEventListener('appinstalled', () => {
  Toast.show('تم تثبيت H.A.M.D بنجاح! 🎉', 'success');
  window._deferredPrompt = null;
});
</script>

</body>
</html>
